version: "3.8"

services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: task_tracker
      POSTGRES_USER: tracker_user
      POSTGRES_PASSWORD: tracker_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - tracker-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: task_tracker
      DB_USERNAME: tracker_user
      DB_PASSWORD: tracker_password
    depends_on:
      - database
    networks:
      - tracker-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - tracker-network

networks:
  tracker-network:
    driver: bridge

volumes:
  pgdata:
